<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISU Team Office — Interactive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* HUD Panel */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(5, 10, 30, 0.85);
            border: 1px solid rgba(100, 160, 255, 0.3);
            border-radius: 12px;
            padding: 18px 22px;
            color: #cde;
            max-width: 260px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(60, 100, 255, 0.15), inset 0 0 20px rgba(60, 100, 255, 0.05);
        }

        #hud-logo {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #7ab4ff;
            border-bottom: 1px solid rgba(100, 160, 255, 0.2);
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        #hud-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #e8f0ff;
            margin-bottom: 14px;
            line-height: 1.3;
        }

        .hud-key {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 6px 0;
            font-size: 13px;
            color: #9ab;
        }

        .key-badge {
            font-family: 'Space Mono', monospace;
            background: rgba(100, 160, 255, 0.15);
            border: 1px solid rgba(100, 160, 255, 0.3);
            border-radius: 4px;
            padding: 2px 7px;
            font-size: 11px;
            color: #7ab4ff;
            min-width: 28px;
            text-align: center;
        }

        /* Dialogue Panel */
        #dialogue-box {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 10, 30, 0.96);
            border: 1px solid rgba(100, 160, 255, 0.35);
            border-radius: 16px;
            padding: 24px 28px;
            max-width: 680px;
            width: calc(100vw - 40px);
            display: none;
            box-shadow: 0 0 60px rgba(60, 100, 255, 0.25), 0 20px 60px rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
        }

        #dialogue-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(100,160,255,0.2);
        }

        #dialogue-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            flex-shrink: 0;
        }

        #dialogue-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 15px;
            color: #e8f0ff;
        }

        #dialogue-role {
            font-size: 12px;
            color: #7ab4ff;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.5px;
        }

        #dialogue-content {
            max-height: 160px;
            overflow-y: auto;
            margin-bottom: 14px;
            font-size: 14px;
            line-height: 1.65;
            color: #cde;
            scrollbar-width: thin;
            scrollbar-color: rgba(100,160,255,0.3) transparent;
        }

        #dialogue-content p { margin: 6px 0; }
        #dialogue-content strong { color: #7ab4ff; }

        #dialogue-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .dialogue-option {
            background: rgba(60, 100, 200, 0.12);
            border: 1px solid rgba(100, 160, 255, 0.25);
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 12.5px;
            color: #a8c8ff;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s ease;
            text-align: left;
        }

        .dialogue-option:hover {
            background: rgba(60, 100, 255, 0.25);
            border-color: rgba(100, 160, 255, 0.6);
            color: #e8f0ff;
            transform: translateY(-1px);
        }

        #custom-q-wrap {
            border-top: 1px solid rgba(100,160,255,0.15);
            padding-top: 12px;
            display: flex;
            gap: 8px;
        }

        #custom-q-input {
            flex: 1;
            background: rgba(10, 20, 60, 0.8);
            border: 1px solid rgba(100, 160, 255, 0.3);
            border-radius: 8px;
            padding: 9px 14px;
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            color: #e8f0ff;
            outline: none;
            transition: border-color 0.2s;
        }

        #custom-q-input::placeholder { color: rgba(120,160,255,0.45); }
        #custom-q-input:focus { border-color: rgba(100, 160, 255, 0.65); }

        #custom-q-btn {
            background: rgba(60, 100, 255, 0.7);
            border: 1px solid rgba(100, 160, 255, 0.5);
            border-radius: 8px;
            padding: 9px 16px;
            color: #e8f0ff;
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        #custom-q-btn:hover { background: rgba(80, 130, 255, 0.85); }
        #custom-q-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Interaction prompt */
        #interact-prompt {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 10, 30, 0.9);
            border: 1px solid rgba(100, 160, 255, 0.4);
            color: #a8c8ff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Space Mono', monospace;
            display: none;
            letter-spacing: 0.5px;
            box-shadow: 0 0 20px rgba(60, 100, 255, 0.2);
        }

        /* Floating text */
        .float-txt {
            position: absolute;
            color: #7ab4ff;
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            pointer-events: none;
            animation: floatUp 2s ease-out forwards;
            text-shadow: 0 0 10px rgba(100,180,255,0.8);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.2); }
        }

        /* Starfield overlay */
        #starfield {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
<div id="canvas-container">
    <canvas id="starfield"></canvas>
</div>

<div id="hud">
    <div id="hud-logo">ISU — Strasbourg</div>
    <div id="hud-title">Short Courses Team Office</div>
    <div class="hud-key"><span class="key-badge">WASD</span> Move</div>
    <div class="hud-key"><span class="key-badge">← →</span> Look</div>
    <div class="hud-key"><span class="key-badge">E</span> Talk</div>
    <div class="hud-key"><span class="key-badge">SPC</span> Celebrate</div>
    <div class="hud-key"><span class="key-badge">ESC</span> Close</div>
</div>

<div id="interact-prompt">Press E to talk</div>

<div id="dialogue-box">
    <div id="dialogue-header">
        <div id="dialogue-avatar">?</div>
        <div>
            <div id="dialogue-name">Name</div>
            <div id="dialogue-role">Role</div>
        </div>
    </div>
    <div id="dialogue-content"></div>
    <div id="dialogue-options"></div>
    <div id="custom-q-wrap">
        <input type="text" id="custom-q-input" placeholder="Ask anything about ISU, space, or the team…" maxlength="220">
        <button id="custom-q-btn">Send ↵</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── STARFIELD BACKGROUND ───────────────────────────────────────────────────
(function() {
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    function makeStars(n) {
        stars = [];
        for (let i = 0; i < n; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.2 + 0.2,
                a: Math.random(),
                speed: Math.random() * 0.003 + 0.001
            });
        }
    }
    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const s of stars) {
            s.a += s.speed;
            const alpha = 0.3 + 0.5 * Math.abs(Math.sin(s.a));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(160, 200, 255, ${alpha})`;
            ctx.fill();
        }
        requestAnimationFrame(drawStars);
    }
    resize();
    makeStars(200);
    drawStars();
    window.addEventListener('resize', () => { resize(); makeStars(200); });
})();

// ─── THREE.JS SCENE ──────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03060f);
scene.fog = new THREE.FogExp2(0x03060f, 0.018);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// ─── LIGHTING ────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a2a4a, 1.2));

const keyLight = new THREE.DirectionalLight(0x6699ff, 0.9);
keyLight.position.set(8, 12, 8);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 60;
keyLight.shadow.camera.left = -25;
keyLight.shadow.camera.right = 25;
keyLight.shadow.camera.top = 25;
keyLight.shadow.camera.bottom = -25;
scene.add(keyLight);

const fillLight = new THREE.PointLight(0x3355aa, 0.6, 30);
fillLight.position.set(-8, 4, 0);
scene.add(fillLight);

// Accent ceiling lights
[-10, 0, 10].forEach(x => {
    const lamp = new THREE.PointLight(0x4477cc, 0.8, 15);
    lamp.position.set(x, 4.5, -8);
    scene.add(lamp);
});

// ─── FLOOR ───────────────────────────────────────────────────────────────────
const floorMat = new THREE.MeshStandardMaterial({ color: 0x080d1a, roughness: 0.8, metalness: 0.3 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Grid lines on floor
const gridHelper = new THREE.GridHelper(40, 20, 0x0d1a3a, 0x0a1428);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ─── WALLS ───────────────────────────────────────────────────────────────────
const wallMat = new THREE.MeshStandardMaterial({ color: 0x060c1e, roughness: 0.95 });

function makeWall(w, h, x, y, z, ry) {
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat);
    mesh.position.set(x, y, z);
    mesh.rotation.y = ry;
    mesh.receiveShadow = true;
    scene.add(mesh);
}
makeWall(40, 10, 0, 5, -20, 0);
makeWall(40, 10, -20, 5, 0, Math.PI / 2);
makeWall(40, 10, 20, 5, 0, -Math.PI / 2);

// ─── ISU BANNER ──────────────────────────────────────────────────────────────
function makeTextSprite(text, subtext, bgColor) {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 192;
    const c = canvas.getContext('2d');
    c.fillStyle = bgColor || '#08122a';
    c.fillRect(0, 0, 512, 192);
    c.strokeStyle = 'rgba(100,160,255,0.4)';
    c.lineWidth = 3;
    c.strokeRect(4, 4, 504, 184);
    c.fillStyle = '#7ab4ff';
    c.font = 'bold 52px sans-serif';
    c.textAlign = 'center';
    c.fillText(text, 256, 80);
    if (subtext) {
        c.fillStyle = '#5588cc';
        c.font = '26px sans-serif';
        c.fillText(subtext, 256, 130);
    }
    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(8, 3, 1);
    return sprite;
}

const banner = makeTextSprite('ISU', 'International Space University');
banner.position.set(0, 7, -19.5);
scene.add(banner);

// ─── DESKS ───────────────────────────────────────────────────────────────────
const deskMat = new THREE.MeshStandardMaterial({ color: 0x0d1b33, roughness: 0.6, metalness: 0.4 });
const metalMat = new THREE.MeshStandardMaterial({ color: 0x2a3a5a, roughness: 0.3, metalness: 0.9 });
const screenMat = new THREE.MeshStandardMaterial({ color: 0x0a1428, roughness: 0.1, metalness: 0.5, emissive: 0x1133aa, emissiveIntensity: 0.3 });

function createDesk(x, z, rotation) {
    const g = new THREE.Group();

    const top = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.08, 1.4), deskMat);
    top.position.y = 0.76; top.castShadow = true; top.receiveShadow = true;
    g.add(top);

    [[-1.3, 0, -0.6],[1.3,0,-0.6],[-1.3,0,0.6],[1.3,0,0.6]].forEach(([px,py,pz]) => {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.72, 0.06), metalMat);
        leg.position.set(px, 0.36, pz);
        g.add(leg);
    });

    // Monitor
    const monBase = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.04, 12), metalMat);
    monBase.position.set(0, 0.82, 0); g.add(monBase);
    const monStem = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.25, 0.04), metalMat);
    monStem.position.set(0, 0.96, 0); g.add(monStem);
    const monScreen = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.65, 0.04), screenMat);
    monScreen.position.set(0, 1.26, 0); g.add(monScreen);

    // Keyboard
    const kbd = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.015, 0.13), metalMat);
    kbd.position.set(0, 0.8, 0.28); g.add(kbd);

    // ISU mug
    const mugMat = new THREE.MeshStandardMaterial({ color: 0x1a4080, roughness: 0.7 });
    const mug = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.08, 8), mugMat);
    mug.position.set(0.6, 0.84, 0.1); g.add(mug);

    // Chair
    const chairMat = new THREE.MeshStandardMaterial({ color: 0x111a30, roughness: 0.8 });
    const seat = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.05, 0.52), chairMat);
    seat.position.set(0, 0.48, 0.85); g.add(seat);
    const back = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.55, 0.05), chairMat);
    back.position.set(0, 0.78, 1.08); g.add(back);

    g.position.set(x, 0, z);
    if (rotation) g.rotation.y = rotation;
    scene.add(g);
    return g;
}

createDesk(-8, -8);
createDesk(0, -8);
createDesk(8, -8);

// ─── WHITEBOARD ──────────────────────────────────────────────────────────────
const wbMat = new THREE.MeshStandardMaterial({ color: 0x0e1a38, roughness: 0.2, emissive: 0x0a1428, emissiveIntensity: 0.3 });
const wb = new THREE.Mesh(new THREE.BoxGeometry(5, 2.5, 0.08), wbMat);
wb.position.set(0, 3.2, -19.7);
wb.castShadow = true;
scene.add(wb);

// Whiteboard text
const wbSprite = makeTextSprite('ESC · SSP · CUSTOM', 'Build. Sell. Launch.');
wbSprite.position.set(0, 3.2, -19.5);
wbSprite.scale.set(7, 2.8, 1);
scene.add(wbSprite);

// ─── PLANTS ──────────────────────────────────────────────────────────────────
[[-16, -16],[16, -16],[-16, 12]].forEach(([x,z]) => {
    const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.22, 0.35, 8),
        new THREE.MeshStandardMaterial({ color: 0x1a2a1a }));
    pot.position.set(x, 0.17, z);
    scene.add(pot);
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(0.55, 7, 6),
        new THREE.MeshStandardMaterial({ color: 0x1a4a22, roughness: 0.9 }));
    leaves.position.set(x, 0.75, z);
    scene.add(leaves);
});

// ─── CHARACTERS ──────────────────────────────────────────────────────────────
const characters = [];

function makeLabel(name, role, color) {
    const cv = document.createElement('canvas');
    cv.width = 320; cv.height = 80;
    const c = cv.getContext('2d');
    c.fillStyle = 'rgba(5,10,30,0.92)';
    roundRect(c, 0, 0, 320, 80, 10);
    c.fill();
    c.strokeStyle = color;
    c.lineWidth = 2;
    roundRect(c, 1, 1, 318, 78, 10);
    c.stroke();
    c.fillStyle = '#e8f0ff';
    c.font = 'bold 22px Outfit, sans-serif';
    c.textAlign = 'center';
    c.fillText(name, 160, 30);
    c.fillStyle = color;
    c.font = '15px Space Mono, monospace';
    c.fillText(role, 160, 56);
    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(2.4, 0.6, 1);
    return sprite;
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function createCharacter(data) {
    const g = new THREE.Group();

    const bodyMat = new THREE.MeshStandardMaterial({ color: data.shirtColor, roughness: 0.7 });
    const skinMat = new THREE.MeshStandardMaterial({ color: 0xf0c8a0, roughness: 0.8 });
    const pantsMat = new THREE.MeshStandardMaterial({ color: 0x1a2440, roughness: 0.8 });
    const hairMat = new THREE.MeshStandardMaterial({ color: data.hairColor, roughness: 0.9 });

    // Body
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.26, 0.75, 8), bodyMat);
    torso.position.y = 0.63; torso.castShadow = true; g.add(torso);

    // Arms
    const armGeo = new THREE.CylinderGeometry(0.07, 0.07, 0.55, 6);
    const lArm = new THREE.Mesh(armGeo, bodyMat);
    lArm.position.set(-0.28, 0.68, 0); lArm.rotation.z = Math.PI / 9;
    lArm.castShadow = true; g.add(lArm);
    const rArm = new THREE.Mesh(armGeo, bodyMat);
    rArm.position.set(0.28, 0.68, 0); rArm.rotation.z = -Math.PI / 9;
    rArm.castShadow = true; g.add(rArm);

    // Legs
    const legGeo = new THREE.CylinderGeometry(0.09, 0.09, 0.7, 6);
    const lLeg = new THREE.Mesh(legGeo, pantsMat);
    lLeg.position.set(-0.13, 0.35, 0); g.add(lLeg);
    const rLeg = new THREE.Mesh(legGeo, pantsMat);
    rLeg.position.set(0.13, 0.35, 0); g.add(rLeg);

    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 7), skinMat);
    head.position.y = 1.22; head.castShadow = true; g.add(head);

    // Hair
    const hair = new THREE.Mesh(new THREE.SphereGeometry(0.24, 8, 6), hairMat);
    hair.position.set(0, 1.32, 0); hair.scale.y = 0.55; g.add(hair);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.025, 4, 4);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const lEye = new THREE.Mesh(eyeGeo, eyeMat); lEye.position.set(-0.07, 1.22, 0.2); g.add(lEye);
    const rEye = new THREE.Mesh(eyeGeo, eyeMat); rEye.position.set(0.07, 1.22, 0.2); g.add(rEye);

    // Label
    const label = makeLabel(data.name, data.role, data.labelColor || '#7ab4ff');
    label.position.y = 1.8; g.add(label);

    g.position.set(data.x, 0, data.z);
    g.userData = {
        ...data,
        conversations: [],
        lArm, rArm,
        initPos: new THREE.Vector3(data.x, 0, data.z),
        targetPos: new THREE.Vector3(data.x, 0, data.z),
        moveTimer: Math.random() * 4,
        isDancing: false,
        isIdle: true,
    };
    characters.push(g);
    scene.add(g);
    return g;
}

// The three ISU team members
const andrew = createCharacter({
    name: 'Andrew',
    role: 'Marketer',
    x: -8, z: -2,
    shirtColor: 0x2a5080,
    hairColor: 0x3a2a1a,
    labelColor: '#55aaff',
    emoji: '📣',
    personality: 'energetic and creative marketer who thinks in campaigns and audience segments',
    quirk: 'relates everything back to the customer journey somehow',
    topics: {
        marketing: [
            "Good marketing for ISU isn't about broadcasting — it's about finding the people who already need what we do and making sure they recognise themselves in our messaging.",
            "We're not selling education. We're selling legitimacy in the space sector. Those two things need completely different creative strategies.",
            "The hardest part is translating something as abstract as 'decision-making confidence' into copy that makes a programme director at ESA click 'apply'.",
            "I keep pushing us to move away from 'comprehensive overview' language. Nobody buys transformation because they heard the word 'overview'."
        ],
        audience: [
            "Our segments are pretty distinct — Legitimacy Seekers want the badge, Judgment Builders want the frameworks, Strategic Navigators want the network. One message won't reach all three.",
            "When I see 'we cover everything from policy to technical to commercial', I think: who is that actually for? ESC works best when it's pointed at a clear someone.",

// ─── FLOATING TEXT ────────────────────────────────────────────────────────────
function floatText(text, worldPos) {
    const sp = worldPos.clone().project(camera);
    const x = (sp.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-sp.y * 0.5 + 0.5) * window.innerHeight;
    const d = document.createElement('div');
    d.className = 'float-txt';
    d.textContent = text;
    d.style.left = x + 'px';
    d.style.top = y + 'px';
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 2100);
}

// ─── PLAYER ───────────────────────────────────────────────────────────────────
const player = { pos: new THREE.Vector3(0, 1.7, 6), isDancing: false };
const keys = {};

document.addEventListener('keydown', e => {
    if (document.activeElement === document.getElementById('custom-q-input')) {
        if (e.key === 'Escape') { closeDlg(); if (document.pointerLockElement) document.exitPointerLock(); }
        return;
    }
    keys[e.key] = true;
    if (e.key.toLowerCase() === 'e' && nearbyChar && dlgBox.style.display !== 'block') { e.preventDefault(); openDlg(nearbyChar); }
    if (e.key === ' ' && dlgBox.style.display !== 'block') { e.preventDefault(); player.isDancing = true; floatText('🚀✨', player.pos.clone().add(new THREE.Vector3(0,0.5,0))); }
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
    if (e.key === 'Escape') { closeDlg(); if (document.pointerLockElement) document.exitPointerLock(); }
});

document.addEventListener('keyup', e => {
    if (document.activeElement === document.getElementById('custom-q-input')) return;
    keys[e.key] = false;
    if (e.key === ' ') player.isDancing = false;
});

// ─── MOUSE LOOK ───────────────────────────────────────────────────────────────
let camYaw = 0;
const dlgBox = document.getElementById('dialogue-box');

document.addEventListener('mousemove', e => {
    if (document.pointerLockElement === renderer.domElement && dlgBox.style.display !== 'block') {
        camYaw -= e.movementX * 0.002;
    }
});

// Pointer lock for looking around when clicking the canvas
renderer.domElement.addEventListener('click', () => {
    if (dlgBox.style.display !== 'block') {
        renderer.domElement.requestPointerLock();
    }
});

// ─── DIALOGUE SYSTEM & LOGIC ──────────────────────────────────────────────────
let nearbyChar = null;
const promptEl = document.getElementById('interact-prompt');
const contentEl = document.getElementById('dialogue-content');

function openDlg(char) {
    if (document.pointerLockElement) document.exitPointerLock();
    dlgBox.style.display = 'block';
    
    document.getElementById('dialogue-avatar').textContent = char.userData.emoji;
    document.getElementById('dialogue-name').textContent = char.userData.name;
    document.getElementById('dialogue-role').textContent = char.userData.role;
    
    // Welcome message
    contentEl.innerHTML = `<p><strong>${char.userData.name}:</strong> Hey, I'm ${char.userData.name}. What do you want to chat about?</p>`;
    
    // Populate options
    const optionsEl = document.getElementById('dialogue-options');
    optionsEl.innerHTML = '';
    
    Object.keys(char.userData.topics).forEach(topic => {
        if (topic !== 'default') {
            const btn = document.createElement('button');
            btn.className = 'dialogue-option';
            btn.textContent = `Ask about ${topic}`;
            btn.onclick = () => {
                const responses = char.userData.topics[topic];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                contentEl.innerHTML += `<p><strong>You:</strong> Let's talk about ${topic}.</p>`;
                contentEl.innerHTML += `<p><strong>${char.userData.name}:</strong> ${randomResponse}</p>`;
                contentEl.scrollTop = contentEl.scrollHeight;
            };
            optionsEl.appendChild(btn);
        }
    });
}

function closeDlg() {
    dlgBox.style.display = 'none';
    document.getElementById('custom-q-input').value = '';
}

// Custom question button handler
document.getElementById('custom-q-btn').addEventListener('click', () => {
    const input = document.getElementById('custom-q-input');
    const q = input.value.trim();
    if (!q || !nearbyChar) return;
    
    contentEl.innerHTML += `<p><strong>You:</strong> ${q}</p>`;
    
    const defs = nearbyChar.userData.topics.default;
    const response = defs[Math.floor(Math.random() * defs.length)];
    
    // Simulate thinking delay
    setTimeout(() => {
        contentEl.innerHTML += `<p><strong>${nearbyChar.userData.name}:</strong> ${response}</p>`;
        contentEl.scrollTop = contentEl.scrollHeight;
    }, 400);
    
    input.value = '';
});

// ─── MAIN ANIMATION LOOP ──────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const time = clock.getElapsedTime();

    // 1. Player Movement (WASD)
    if (dlgBox.style.display !== 'block') {
        const speed = 6 * dt;
        const dir = new THREE.Vector3();
        
        if (keys['w'] || keys['W']) dir.z -= 1;
        if (keys['s'] || keys['S']) dir.z += 1;
        if (keys['a'] || keys['A']) dir.x -= 1;
        if (keys['d'] || keys['D']) dir.x += 1;

        if (dir.lengthSq() > 0) {
            dir.normalize();
            // Move relative to camera direction
            dir.applyAxisAngle(new THREE.Vector3(0, 1, 0), camYaw);
            player.pos.add(dir.multiplyScalar(speed));
        }
        
        // Basic office boundaries
        player.pos.x = Math.max(-18, Math.min(18, player.pos.x));
        player.pos.z = Math.max(-18, Math.min(18, player.pos.z));
    }

    camera.position.copy(player.pos);
    camera.rotation.y = camYaw;

    // 2. Character Logic & Interaction Distance
    let closestChar = null;
    let minDist = 3.5; // Interaction radius

    characters.forEach(char => {
        const data = char.userData;
        const dist = camera.position.distanceTo(char.position);
        
        if (dist < minDist) {
            minDist = dist;
            closestChar = char;
        }

        // Idle floating animation
        char.position.y = Math.sin(time * 2 + data.x) * 0.03;

        // Face player if close
        if (dist < 6) {
            char.lookAt(camera.position.x, char.position.y, camera.position.z);
        } else {
            char.rotation.y = 0;
        }

        // Dancing easter egg (Spacebar)
        if (player.isDancing && dist < 12) {
            data.lArm.rotation.x = Math.sin(time * 15) * 0.8;
            data.rArm.rotation.x = Math.sin(time * 15 + Math.PI) * 0.8;
            char.position.y += Math.abs(Math.sin(time * 10)) * 0.1; 
        } else {
            data.lArm.rotation.x = 0;
            data.rArm.rotation.x = 0;
        }
    });

    // 3. UI Prompt Update
    nearbyChar = closestChar;
    if (nearbyChar && dlgBox.style.display !== 'block') {
        promptEl.style.display = 'block';
        promptEl.textContent = `Press E to talk to ${nearbyChar.userData.name}`;
    } else {
        promptEl.style.display = 'none';
    }

    renderer.render(scene, camera);
}

// Start the engine
animate();
</script>
