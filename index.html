<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISU Team Office вҖ” Interactive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* HUD Panel */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(5, 10, 30, 0.85);
            border: 1px solid rgba(100, 160, 255, 0.3);
            border-radius: 12px;
            padding: 18px 22px;
            color: #cde;
            max-width: 260px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(60, 100, 255, 0.15), inset 0 0 20px rgba(60, 100, 255, 0.05);
        }

        #hud-logo {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #7ab4ff;
            border-bottom: 1px solid rgba(100, 160, 255, 0.2);
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        #hud-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #e8f0ff;
            margin-bottom: 14px;
            line-height: 1.3;
        }

        .hud-key {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 6px 0;
            font-size: 13px;
            color: #9ab;
        }

        .key-badge {
            font-family: 'Space Mono', monospace;
            background: rgba(100, 160, 255, 0.15);
            border: 1px solid rgba(100, 160, 255, 0.3);
            border-radius: 4px;
            padding: 2px 7px;
            font-size: 11px;
            color: #7ab4ff;
            min-width: 28px;
            text-align: center;
        }

        /* Dialogue Panel */
        #dialogue-box {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 10, 30, 0.96);
            border: 1px solid rgba(100, 160, 255, 0.35);
            border-radius: 16px;
            padding: 24px 28px;
            max-width: 680px;
            width: calc(100vw - 40px);
            display: none;
            box-shadow: 0 0 60px rgba(60, 100, 255, 0.25), 0 20px 60px rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
        }

        #dialogue-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(100,160,255,0.2);
        }

        #dialogue-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            flex-shrink: 0;
        }

        #dialogue-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 15px;
            color: #e8f0ff;
        }

        #dialogue-role {
            font-size: 12px;
            color: #7ab4ff;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.5px;
        }

        #dialogue-content {
            max-height: 160px;
            overflow-y: auto;
            margin-bottom: 14px;
            font-size: 14px;
            line-height: 1.65;
            color: #cde;
            scrollbar-width: thin;
            scrollbar-color: rgba(100,160,255,0.3) transparent;
        }

        #dialogue-content p { margin: 6px 0; }
        #dialogue-content strong { color: #7ab4ff; }

        #dialogue-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .dialogue-option {
            background: rgba(60, 100, 200, 0.12);
            border: 1px solid rgba(100, 160, 255, 0.25);
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 12.5px;
            color: #a8c8ff;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s ease;
            text-align: left;
        }

        .dialogue-option:hover {
            background: rgba(60, 100, 255, 0.25);
            border-color: rgba(100, 160, 255, 0.6);
            color: #e8f0ff;
            transform: translateY(-1px);
        }

        #custom-q-wrap {
            border-top: 1px solid rgba(100,160,255,0.15);
            padding-top: 12px;
            display: flex;
            gap: 8px;
        }

        #custom-q-input {
            flex: 1;
            background: rgba(10, 20, 60, 0.8);
            border: 1px solid rgba(100, 160, 255, 0.3);
            border-radius: 8px;
            padding: 9px 14px;
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            color: #e8f0ff;
            outline: none;
            transition: border-color 0.2s;
        }

        #custom-q-input::placeholder { color: rgba(120,160,255,0.45); }
        #custom-q-input:focus { border-color: rgba(100, 160, 255, 0.65); }

        #custom-q-btn {
            background: rgba(60, 100, 255, 0.7);
            border: 1px solid rgba(100, 160, 255, 0.5);
            border-radius: 8px;
            padding: 9px 16px;
            color: #e8f0ff;
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        #custom-q-btn:hover { background: rgba(80, 130, 255, 0.85); }
        #custom-q-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Interaction prompt */
        #interact-prompt {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 10, 30, 0.9);
            border: 1px solid rgba(100, 160, 255, 0.4);
            color: #a8c8ff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Space Mono', monospace;
            display: none;
            letter-spacing: 0.5px;
            box-shadow: 0 0 20px rgba(60, 100, 255, 0.2);
        }

        /* Loading spinner */
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(100, 160, 255, 0.2);
            border-radius: 50%;
            border-top-color: #7ab4ff;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Floating text */
        .float-txt {
            position: absolute;
            color: #7ab4ff;
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            pointer-events: none;
            animation: floatUp 2s ease-out forwards;
            text-shadow: 0 0 10px rgba(100,180,255,0.8);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.2); }
        }

        /* Starfield overlay */
        #starfield {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
<div id="canvas-container">
    <canvas id="starfield"></canvas>
</div>

<div id="hud">
    <div id="hud-logo">ISU вҖ” Strasbourg</div>
    <div id="hud-title">Short Courses Team Office</div>
    <div class="hud-key"><span class="key-badge">WASD</span> Move</div>
    <div class="hud-key"><span class="key-badge">вҶҗ вҶ’</span> Look</div>
    <div class="hud-key"><span class="key-badge">E</span> Talk</div>
    <div class="hud-key"><span class="key-badge">SPC</span> Celebrate</div>
    <div class="hud-key"><span class="key-badge">ESC</span> Close</div>
</div>

<div id="interact-prompt">Press E to talk</div>

<div id="dialogue-box">
    <div id="dialogue-header">
        <div id="dialogue-avatar">?</div>
        <div>
            <div id="dialogue-name">Name</div>
            <div id="dialogue-role">Role</div>

        <input type="text" id="custom-q-input" placeholder="Ask anything about ISU, space, or the teamвҖҰ" maxlength="220">

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// в”Җв”Җв”Җ STARFIELD BACKGROUND в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
(function() {
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    function makeStars(n) {
        stars = [];
        for (let i = 0; i < n; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.2 + 0.2,
                a: Math.random(),
                speed: Math.random() * 0.003 + 0.001
            });
        }
    }
    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const s of stars) {
            s.a += s.speed;
            const alpha = 0.3 + 0.5 * Math.abs(Math.sin(s.a));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(160, 200, 255, ${alpha})`;
            ctx.fill();
        }
        requestAnimationFrame(drawStars);
    }
    resize();
    makeStars(200);
    drawStars();
    window.addEventListener('resize', () => { resize(); makeStars(200); });
})();

// в”Җв”Җв”Җ THREE.JS SCENE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03060f);
scene.fog = new THREE.FogExp2(0x03060f, 0.018);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// в”Җв”Җв”Җ LIGHTING в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
scene.add(new THREE.AmbientLight(0x1a2a4a, 1.2));

const keyLight = new THREE.DirectionalLight(0x6699ff, 0.9);
keyLight.position.set(8, 12, 8);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 60;
keyLight.shadow.camera.left = -25;
keyLight.shadow.camera.right = 25;
keyLight.shadow.camera.top = 25;
keyLight.shadow.camera.bottom = -25;
scene.add(keyLight);

const fillLight = new THREE.PointLight(0x3355aa, 0.6, 30);
fillLight.position.set(-8, 4, 0);
scene.add(fillLight);

// Accent ceiling lights
[-10, 0, 10].forEach(x => {
    const lamp = new THREE.PointLight(0x4477cc, 0.8, 15);
    lamp.position.set(x, 4.5, -8);
    scene.add(lamp);
});

// в”Җв”Җв”Җ FLOOR в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const floorMat = new THREE.MeshStandardMaterial({ color: 0x080d1a, roughness: 0.8, metalness: 0.3 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Grid lines on floor
const gridHelper = new THREE.GridHelper(40, 20, 0x0d1a3a, 0x0a1428);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// в”Җв”Җв”Җ WALLS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const wallMat = new THREE.MeshStandardMaterial({ color: 0x060c1e, roughness: 0.95 });

function makeWall(w, h, x, y, z, ry) {
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat);
    mesh.position.set(x, y, z);
    mesh.rotation.y = ry;
    mesh.receiveShadow = true;
    scene.add(mesh);
}
makeWall(40, 10, 0, 5, -20, 0);
makeWall(40, 10, -20, 5, 0, Math.PI / 2);
makeWall(40, 10, 20, 5, 0, -Math.PI / 2);

// в”Җв”Җв”Җ ISU BANNER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function makeTextSprite(text, subtext, bgColor) {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 192;
    const c = canvas.getContext('2d');
    c.fillStyle = bgColor || '#08122a';
    c.fillRect(0, 0, 512, 192);
    c.strokeStyle = 'rgba(100,160,255,0.4)';
    c.lineWidth = 3;
    c.strokeRect(4, 4, 504, 184);
    c.fillStyle = '#7ab4ff';
    c.font = 'bold 52px sans-serif';
    c.textAlign = 'center';
    c.fillText(text, 256, 80);
    if (subtext) {
        c.fillStyle = '#5588cc';
        c.font = '26px sans-serif';
        c.fillText(subtext, 256, 130);
    }
    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(8, 3, 1);
    return sprite;
}

const banner = makeTextSprite('ISU', 'International Space University');
banner.position.set(0, 7, -19.5);
scene.add(banner);

// в”Җв”Җв”Җ DESKS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const deskMat = new THREE.MeshStandardMaterial({ color: 0x0d1b33, roughness: 0.6, metalness: 0.4 });
const metalMat = new THREE.MeshStandardMaterial({ color: 0x2a3a5a, roughness: 0.3, metalness: 0.9 });
const screenMat = new THREE.MeshStandardMaterial({ color: 0x0a1428, roughness: 0.1, metalness: 0.5, emissive: 0x1133aa, emissiveIntensity: 0.3 });

function createDesk(x, z, rotation) {
    const g = new THREE.Group();

    const top = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.08, 1.4), deskMat);
    top.position.y = 0.76; top.castShadow = true; top.receiveShadow = true;
    g.add(top);

    [[вҲ’1.3, 0, вҲ’0.6],[1.3,0,вҲ’0.6],[вҲ’1.3,0,0.6],[1.3,0,0.6]].forEach(([px,py,pz]) => {
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.72, 0.06), metalMat);
        leg.position.set(px, 0.36, pz);
        g.add(leg);
    });

    // Monitor
    const monBase = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.04, 12), metalMat);
    monBase.position.set(0, 0.82, 0); g.add(monBase);
    const monStem = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.25, 0.04), metalMat);
    monStem.position.set(0, 0.96, 0); g.add(monStem);
    const monScreen = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.65, 0.04), screenMat);
    monScreen.position.set(0, 1.26, 0); g.add(monScreen);

    // Keyboard
    const kbd = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.015, 0.13), metalMat);
    kbd.position.set(0, 0.8, 0.28); g.add(kbd);

    // ISU mug
    const mugMat = new THREE.MeshStandardMaterial({ color: 0x1a4080, roughness: 0.7 });
    const mug = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.08, 8), mugMat);
    mug.position.set(0.6, 0.84, 0.1); g.add(mug);

    // Chair
    const chairMat = new THREE.MeshStandardMaterial({ color: 0x111a30, roughness: 0.8 });
    const seat = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.05, 0.52), chairMat);
    seat.position.set(0, 0.48, 0.85); g.add(seat);
    const back = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.55, 0.05), chairMat);
    back.position.set(0, 0.78, 1.08); g.add(back);

    g.position.set(x, 0, z);
    if (rotation) g.rotation.y = rotation;
    scene.add(g);
    return g;
}

createDesk(-8, -8);
createDesk(0, -8);
createDesk(8, -8);

// в”Җв”Җв”Җ WHITEBOARD в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const wbMat = new THREE.MeshStandardMaterial({ color: 0x0e1a38, roughness: 0.2, emissive: 0x0a1428, emissiveIntensity: 0.3 });
const wb = new THREE.Mesh(new THREE.BoxGeometry(5, 2.5, 0.08), wbMat);
wb.position.set(0, 3.2, -19.7);
wb.castShadow = true;
scene.add(wb);

// Whiteboard text
const wbSprite = makeTextSprite('ESC В· SSP В· CUSTOM', 'Build. Sell. Launch.');
wbSprite.position.set(0, 3.2, -19.5);

const characters = [];

function makeLabel(name, role, color) {
    const cv = document.createElement('canvas');
    cv.width = 320; cv.height = 80;
    const c = cv.getContext('2d');
    c.fillStyle = 'rgba(5,10,30,0.92)';
    roundRect(c, 0, 0, 320, 80, 10);
    c.fill();
    c.strokeStyle = color;
    c.lineWidth = 2;
    roundRect(c, 1, 1, 318, 78, 10);
    c.stroke();
    c.fillStyle = '#e8f0ff';
    c.font = 'bold 22px Outfit, sans-serif';
    c.textAlign = 'center';
    c.fillText(name, 160, 30);
    c.fillStyle = color;
    c.font = '15px Space Mono, monospace';
    c.fillText(role, 160, 56);
    const tex = new THREE.CanvasTexture(cv);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(2.4, 0.6, 1);
    return sprite;
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function createCharacter(data) {
    const g = new THREE.Group();

    const bodyMat = new THREE.MeshStandardMaterial({ color: data.shirtColor, roughness: 0.7 });
    const skinMat = new THREE.MeshStandardMaterial({ color: 0xf0c8a0, roughness: 0.8 });
    const pantsMat = new THREE.MeshStandardMaterial({ color: 0x1a2440, roughness: 0.8 });
    const hairMat = new THREE.MeshStandardMaterial({ color: data.hairColor, roughness: 0.9 });

    // Body
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.26, 0.75, 8), bodyMat);
    torso.position.y = 0.63; torso.castShadow = true; g.add(torso);

    // Arms
    const armGeo = new THREE.CylinderGeometry(0.07, 0.07, 0.55, 6);
    const lArm = new THREE.Mesh(armGeo, bodyMat);
    lArm.position.set(вҲ’0.28, 0.68, 0); lArm.rotation.z = Math.PI / 9;
    lArm.castShadow = true; g.add(lArm);
    const rArm = new THREE.Mesh(armGeo, bodyMat);
    rArm.position.set(0.28, 0.68, 0); rArm.rotation.z = -Math.PI / 9;
    rArm.castShadow = true; g.add(rArm);

    // Legs
    const legGeo = new THREE.CylinderGeometry(0.09, 0.09, 0.7, 6);
    const lLeg = new THREE.Mesh(legGeo, pantsMat);
    lLeg.position.set(вҲ’0.13, 0.35, 0); g.add(lLeg);
    const rLeg = new THREE.Mesh(legGeo, pantsMat);
    rLeg.position.set(0.13, 0.35, 0); g.add(rLeg);

    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 7), skinMat);
    head.position.y = 1.22; head.castShadow = true; g.add(head);

    // Hair
    const hair = new THREE.Mesh(new THREE.SphereGeometry(0.24, 8, 6), hairMat);
    hair.position.set(0, 1.32, 0); hair.scale.y = 0.55; g.add(hair);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.025, 4, 4);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const lEye = new THREE.Mesh(eyeGeo, eyeMat); lEye.position.set(вҲ’0.07, 1.22, 0.2); g.add(lEye);
    const rEye = new THREE.Mesh(eyeGeo, eyeMat); rEye.position.set(0.07, 1.22, 0.2); g.add(rEye);

    // Label
    const label = makeLabel(data.name, data.role, data.labelColor || '#7ab4ff');
    label.position.y = 1.8; g.add(label);

    g.position.set(data.x, 0, data.z);
    g.userData = {
        ...data,
        conversations: [],
        lArm, rArm,
        initPos: new THREE.Vector3(data.x, 0, data.z),
        targetPos: new THREE.Vector3(data.x, 0, data.z),
        moveTimer: Math.random() * 4,
        isDancing: false,
        isIdle: true,
    };
    characters.push(g);
    scene.add(g);
    return g;
}

function floatText(text, worldPos) {
    const sp = worldPos.clone().project(camera);
    const x = (sp.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-sp.y * 0.5 + 0.5) * window.innerHeight;
    const d = document.createElement('div');
    d.className = 'float-txt';
    d.textContent = text;
    d.style.left = x + 'px';
    d.style.top = y + 'px';
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 2100);
}

let nearbyChar = null;
let currentChar = null;

function updateChar(ch, dt) {
    const ud = ch.userData;
    if (ch === currentChar) {
        ch.lookAt(new THREE.Vector3(player.pos.x, ch.position.y, player.pos.z));
        ch.rotation.x = 0; ch.rotation.z = 0;
        return;
    }
    if (ud.isDancing) {
        ch.rotation.y += 0.08;
        ch.position.y = Math.abs(Math.sin(Date.now() * 0.008)) * 0.25;
        ud.lArm.rotation.z = Math.sin(Date.now() * 0.012) * 0.6 + Math.PI / 9;
        ud.rArm.rotation.z = -Math.sin(Date.now() * 0.012) * 0.6 - Math.PI / 9;
        return;
    }
    ud.lArm.rotation.z = Math.PI / 9;
    ud.rArm.rotation.z = -Math.PI / 9;

    if (Math.random() < 0.0006) {
        ud.isDancing = true;
        floatText(ud.emoji, ch.position.clone().add(new THREE.Vector3(0, 1.5, 0)));
        setTimeout(() => { ud.isDancing = false; ch.position.y = 0; ch.rotation.y = 0; }, 3500);
    }

    ud.moveTimer -= dt;
    if (ud.moveTimer <= 0) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 2 + Math.random() * 4;
        ud.targetPos.set(
            Math.max(-18, Math.min(18, ud.initPos.x + Math.cos(angle) * dist)),
            0,
            Math.max(-18, Math.min(18, ud.initPos.z + Math.sin(angle) * dist))
        );
        ud.moveTimer = 4 + Math.random() * 6;
    }
    const dir = new THREE.Vector3().subVectors(ud.targetPos, ch.position);
    dir.y = 0;
    if (dir.length() > 0.15) {
        dir.normalize();
        ch.position.addScaledVector(dir, 0.018);
        ch.lookAt(ud.targetPos); ch.rotation.x = 0; ch.rotation.z = 0;
        ch.position.y = Math.abs(Math.sin(Date.now() * 0.007)) * 0.04;
    }
}

function getOptions() {

function openDlg(ch) {

    dlgContent.innerHTML = `<p>${greeting}</p>`;

function randomGreeting(ud) {
    const g = [
        `Good to see you. What's on your mind?`,
        `Perfect timing вҖ” I was just thinking about the next programme push.`,
        `Come in. What do you need to figure out?`,
        `Hey. Ask me anything вҖ” I've been deep in ${ud.role.toLowerCase()} mode all day.`

    return g[Math.floor(Math.random() * g.length)];
}

function closeDlg() {

function renderOptions() {
    dlgOptions.innerHTML = '';
    getOptions().forEach(q => {
        const d = document.createElement('div');
        d.className = 'dialogue-option';
        d.textContent = q;
        d.onclick = () => ask(q);

async function ask(question) {
    if (!currentChar) return;
    const ud = currentChar.userData;

    dlgContent.innerHTML += `<p><strong>You:</strong> ${question}</p>`;
    dlgContent.innerHTML += `<p><strong>${ud.name}:</strong> <span class="loading"></span></p>`;
    dlgContent.scrollTop = dlgContent.scrollHeight;

    dlgOptions.style.opacity = '0.4';
    dlgOptions.style.pointerEvents = 'none';
    qInput.disabled = true; qBtn.disabled = true;

    let answer = '';
    try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 1000,
                messages: [{
                    role: 'user',
                    content: `You are roleplaying as ${ud.name}, ${ud.role} on the ISU Short Courses team at the International Space University in Strasbourg, France.

Your personality: ${ud.personality}
Your quirk: ${ud.quirk}

ISU context: ISU is a legitimacy and judgment institution for the global space sector, not just an education provider. The team sells and delivers short executive courses (ESC: 4 days, ~вӮ¬3,900), the SSP, and custom partner programmes for governments, defence and corporate clients. The core insight is participants aren't buying content вҖ” they're buying legitimacy, decision-making ability, confidence and belonging in the space sector. Custom programmes are the primary growth engine.

The user asked: "${question}"

Reply as ${ud.name} in 50-75 words. Be direct, specific to your role, and genuinely useful. Speak like a real professional, not a chatbot. Reference ISU, space sector realities, or team dynamics naturally.

Return ONLY valid JSON: {"a": "your response here"}`
                }]
            })
        });
        const data = await res.json();
        const raw = data?.content?.[0]?.text || '';
        const clean = raw.replace(/```json|```/g, '').trim();
        answer = JSON.parse(clean).a;
    } catch {
        answer = fallback(ud, question);
    }

    ud.conversations.push({ q: question, a: answer });
    dlgContent.innerHTML = dlgContent.innerHTML.replace('<span class="loading"></span>', answer);
    dlgContent.scrollTop = dlgContent.scrollHeight;

    if (Math.random() < 0.3) floatText('рҹ’Ў', currentChar.position.clone().add(new THREE.Vector3(0, 1.5, 0)));

    renderOptions();
    dlgOptions.style.opacity = '1';
    dlgOptions.style.pointerEvents = 'auto';
    qInput.disabled = false; qBtn.disabled = false;
    qInput.focus();
}

function fallback(ud, q) {
    const ql = q.toLowerCase();
    const topics = ud.topics;
    let key = 'default';
    if (ql.includes('market') || ql.includes('messag') || ql.includes('audience') || ql.includes('campaign')) key = 'marketing';
    else if (ql.includes('operat') || ql.includes('process') || ql.includes('system') || ql.includes('crm')) key = 'operations';
    else if (ql.includes('partner') || ql.includes('deal') || ql.includes('prospect')) key = 'partnerships';
    else if (ql.includes('programme') || ql.includes('esc') || ql.includes('ssp') || ql.includes('custom')) key = 'programmes';
    else if (ql.includes('coord') || ql.includes('team') || ql.includes('connect')) key = 'coordination';
    else if (ql.includes('bd') || ql.includes('pipeline') || ql.includes('revenue')) key = 'bd';
    else if (ql.includes('isu') || ql.includes('differenc') || ql.includes('strength')) key = ud.name === 'Justine' ? 'isu' : 'default';
    else if (ql.includes('audience') || ql.includes('segment')) key = 'audience';
    else if (ql.includes('custom')) key = 'custom';

    const pool = topics[key] || topics['default'];
    return pool[Math.floor(Math.random() * pool.length)];
}

// в”Җв”Җв”Җ CUSTOM Q HANDLERS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
qBtn.addEventListener('click', () => { const v = qInput.value.trim(); if (v && currentChar) { ask(v); qInput.value = ''; } });
qInput.addEventListener('keypress', e => { if (e.key === 'Enter') { const v = qInput.value.trim(); if (v && currentChar) { ask(v); qInput.value = ''; } } });

// в”Җв”Җв”Җ ANIMATION LOOP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let lastT = 0;
function animate(t) {
    requestAnimationFrame(animate);
    const dt = Math.min((t - lastT) / 1000, 0.1);
    lastT = t;

    // Player movement
    if (!player.isDancing && dlgBox.style.display !== 'block') {
        const spd = 0.09;
        const fwd = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), camYaw);
        const rgt = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), camYaw);
        if (keys['w'] || keys['W']) player.pos.addScaledVector(fwd, spd);
        if (keys['s'] || keys['S']) player.pos.addScaledVector(fwd, -spd);
        if (keys['a'] || keys['A']) player.pos.addScaledVector(rgt, -spd);
        if (keys['d'] || keys['D']) player.pos.addScaledVector(rgt, spd);
        if (keys['ArrowLeft'])  camYaw += 0.04;
        if (keys['ArrowRight']) camYaw -= 0.04;
    }

    player.pos.x = Math.max(-19, Math.min(19, player.pos.x));
    player.pos.z = Math.max(-19, Math.min(19, player.pos.z));

    camera.position.copy(player.pos);
    if (!player.isDancing) {
        if (dlgBox.style.display !== 'block') {
            camera.rotation.set(0, camYaw, 0, 'YXZ');
        }
    } else {
        camera.position.y += Math.sin(t * 0.008) * 0.15;
        camera.rotation.set(0, camYaw, Math.sin(t * 0.008) * 0.06, 'YXZ');
    }

    // Update characters
    characters.forEach(ch => updateChar(ch, dt));

    // Nearest character
    nearbyChar = null;
    let minD = Infinity;
    characters.forEach(ch => {
        const d = player.pos.distanceTo(ch.position);
        if (d < 3.5 && d < minD) { minD = d; nearbyChar = ch; }
    });
    if (nearbyChar && !currentChar) {
        promptEl.style.display = 'block';
        promptEl.textContent = `[E] Talk to ${nearbyChar.userData.name}`;
    } else {
        promptEl.style.display = 'none';
    }

    // Ambient ceiling light pulse
    fillLight.intensity = 0.55 + Math.sin(t * 0.001) * 0.05;

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate(0);
</script>
